<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间轴百科 - 20世纪物理学</title>
    <style>
        /* ---------- 全局重置 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 500;
            color: #1a73e8;
        }

        /* ---------- 时间轴容器 ---------- */
        #timeline {
            position: relative;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 0;
        }

        /* 中间竖线 */
        #timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #ccc;
            transform: translateX(-50%);
        }

        /* ---------- 每个事件节点 ---------- */
        .event {
            position: relative;
            width: 50%;
            padding: 20px 40px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .event:hover {
            background: rgba(26, 115, 232, 0.05);
        }

        /* 偶数事件（左侧） */
        .event:nth-child(even) {
            left: 0;
            text-align: right;
            padding-right: 60px;
        }

        /* 奇数事件（右侧） */
        .event:nth-child(odd) {
            left: 50%;
            text-align: left;
            padding-left: 60px;
        }

        /* 圆点 */
        .event::after {
            content: '';
            position: absolute;
            top: 28px;
            width: 14px;
            height: 14px;
            background: #1a73e8;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 0 2px #1a73e8;
        }

        .event:nth-child(even)::after {
            right: -7px;
        }

        .event:nth-child(odd)::after {
            left: -7px;
        }

        .event .year {
            font-size: 22px;
            font-weight: bold;
            color: #1a73e8;
            margin-bottom: 4px;
        }

        .event .title {
            font-size: 16px;
            font-weight: 500;
        }

        .event .summary-preview {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
            display: none; /* 默认隐藏，点击后才显示完整详情 */
        }

        /* ---------- 模态框 ---------- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-card {
            background: white;
            max-width: 480px;
            width: 90%;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            position: relative;
        }

        .modal-card .close-btn {
            position: absolute;
            top: 12px;
            right: 18px;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            background: none;
            border: none;
        }

        .modal-card .modal-year {
            font-size: 20px;
            color: #1a73e8;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .modal-card .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .modal-card .modal-summary {
            font-size: 15px;
            line-height: 1.6;
            color: #444;
            margin-bottom: 12px;
        }

        .modal-card .modal-source {
            font-size: 13px;
            color: #888;
        }

        /* ---------- 年代筛选 ---------- */
        #filter-bar {
            text-align: center;
            margin-bottom: 20px;
        }

        #filter-bar input {
            width: 160px;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        #filter-bar button {
            padding: 8px 16px;
            margin-left: 8px;
            border: none;
            background: #1a73e8;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        #filter-bar button:hover {
            background: #1557b0;
        }

        /* ---------- 响应式 ---------- */
        @media (max-width: 640px) {
            .event {
                width: 100%;
                padding: 15px 20px 15px 50px !important;
                text-align: left !important;
            }
            .event:nth-child(even)::after,
            .event:nth-child(odd)::after {
                left: 18px !important;
                right: auto !important;
            }
            #timeline::before {
                left: 25px;
            }
        }
    </style>
</head>
<body>

<h1>⏳ 20世纪物理学大事记</h1>

<!-- 简易年代筛选 -->
<div id="filter-bar">
    <label>筛选起始年份：</label>
    <input type="number" id="startYear" value="1900" min="1880" max="2020">
    <label>结束年份：</label>
    <input type="number" id="endYear" value="2020" min="1880" max="2020">
    <button onclick="applyFilter()">筛选</button>
</div>

<!-- 时间轴容器 -->
<div id="timeline"></div>

<!-- 模态框 -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
        <button class="close-btn" onclick="closeModal()">&times;</button>
        <div class="modal-year" id="modalYear"></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-summary" id="modalSummary"></div>
        <div class="modal-source" id="modalSource"></div>
    </div>
</div>

<script>
    // ---------- 数据 ----------
    let allEvents = [];  // 存储所有事件

    // 从 data.json 加载数据
    fetch('./data.json')
        .then(response => {
            if (!response.ok) throw new Error('无法加载 data.json');
            return response.json();
        })
        .then(data => {
            allEvents = data;
            renderTimeline(allEvents);
        })
        .catch(err => {
            console.error(err);
            document.getElementById('timeline').innerHTML = '<p style="text-align:center;color:red;">加载数据失败，请确保 data.json 在同目录下。</p>';
        });

    // ---------- 渲染时间轴 ----------
    function renderTimeline(events) {
        const container = document.getElementById('timeline');
        container.innerHTML = '';  // 清空

        events.forEach((evt, index) => {
            const div = document.createElement('div');
            div.className = 'event';
            div.dataset.index = index;

            // 内容
            div.innerHTML = `
                <div class="year">${evt.year}</div>
                <div class="title">${evt.title}</div>
            `;

            // 点击弹出模态框
            div.addEventListener('click', () => openModal(evt));

            container.appendChild(div);
        });
    }

    // ---------- 模态框 ----------
    function openModal(evt) {
        document.getElementById('modalYear').textContent = evt.year;
        document.getElementById('modalTitle').textContent = evt.title;
        document.getElementById('modalSummary').textContent = evt.summary || '暂无详细介绍';
        document.getElementById('modalSource').textContent = '来源：' + (evt.source || '未知');
        document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('active');
    }

    // 点击遮罩关闭
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // ESC 键关闭
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });

    // ---------- 年代筛选 ----------
    function applyFilter() {
        const start = parseInt(document.getElementById('startYear').value) || 1900;
        const end = parseInt(document.getElementById('endYear').value) || 2020;
        const filtered = allEvents.filter(evt => evt.year >= start && evt.year <= end);
        renderTimeline(filtered);
    }
</script>

</body>
</html>
